# Publishes to the Visual Studio Marketplace + Open VSX on push to main/master.
# Required repository secrets:
#   VSCE_TOKEN — Azure DevOps PAT with Marketplace > Manage (see https://code.visualstudio.com/api/working-with-extensions/publishing-extension)
#   OPENVSX_TOKEN — Personal access token from https://open-vsx.org/user-settings/tokens (claim namespace once: https://github.com/eclipse/openvsx/wiki/Namespace-Access)
#   Do not pass the token with ovsx's -t: that flag is --target (CPU arch), not auth. Use OVSX_PAT env or ovsx -p / --pat.
# Tag/release uses the workflow GITHUB_TOKEN (needs contents: write). If your org blocks that, add a PAT as secret PAT_TOKEN and set GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }} on the Tag and release step.

name: Deploy Extension

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver increment from latest git tag (push to main always uses patch)"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      # Next version = latest semver git tag + increment. Does not read package.json on the branch.
      # Push → patch only. For 1.0.0: Actions → Deploy Extension → Run workflow → bump = major (after last tag e.g. v0.0.9).
      - name: Get next version
        uses: reecetech/version-increment@2023.9.3
        id: version
        with:
          scheme: semver
          increment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.bump || 'patch' }}

      - name: Tag and release
        uses: avakar/tag-and-release@v1
        with:
          tag_name: ${{ steps.version.outputs.v-version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: npm ci

      # vsce package lit la version dans package.json : sans cette étape, le .vsix contient encore l’ancienne
      # version alors que vsce publish applique $VERSION au Marketplace → Open VSX rejette « already published ».
      - name: Sync package.json version
        run: npm version "$VERSION" --no-git-tag-version --allow-same-version
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Package VSIX
        run: npx vsce package --out "explorer-enhanced-${VERSION}.vsix"
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Upload VSIX to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.v-version }}
          files: explorer-enhanced-*.vsix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Tag is already created by "Tag and release". --no-git-tag-version avoids `npm version` commit/tag (and Git user.* on the runner).
      # package.json est déjà aligné sur $VERSION ; évite un double bump vs le .vsix.
      - name: Publish to Visual Studio Marketplace
        run: npx vsce publish -p "$VSCE_PAT" --no-git-tag-version
        env:
          VSCE_PAT: ${{ secrets.VSCE_TOKEN }}

      # Même VSIX que ci-dessus — Cursor / VSCodium lisent surtout Open VSX.
      # Pass -p explicitly so auth does not depend on npx/child inheriting OVSX_PAT alone.
      # Ne pas utiliser -t ici : c’est --target (architectures), pas le PAT.
      - name: Publish to Open VSX Registry
        run: npx ovsx publish -p "$OVSX_PAT" "explorer-enhanced-${VERSION}.vsix"
        env:
          VERSION: ${{ steps.version.outputs.version }}
          OVSX_PAT: ${{ secrets.OPENVSX_TOKEN }}
